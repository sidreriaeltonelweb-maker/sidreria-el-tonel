<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración | Sidrería El Tonel</title>
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header class="admin-header">
    <div>
      <p>Sidrería El Tonel</p>
      <h1>Contenido web</h1>
    </div>
    <nav>
      <a href="index.html">Ver web</a>
      <a href="app/">Abrir app</a>
      <button id="logoutBtn" hidden>Cerrar sesión</button>
    </nav>
  </header>

  <main class="admin-main">
    <section id="loginPanel" class="login-panel">
      <p class="eyebrow">Acceso privado</p>
      <h2>Administración</h2>
      <form id="loginForm">
        <label>Email<input id="email" type="email" autocomplete="username" required /></label>
        <label>Contraseña<input id="password" type="password" autocomplete="current-password" required /></label>
        <button type="submit">Entrar</button>
      </form>
    </section>

    <section id="contentPanel" hidden>
      <div class="page-heading">
        <div>
          <p class="eyebrow">Galería</p>
          <h2>Fotografías de la web</h2>
        </div>
        <div id="integrationStatus" class="integration-status"></div>
      </div>

      <form id="uploadForm" class="upload-bar">
        <label>Imagen<input id="archivo" type="file" accept="image/jpeg,image/png,image/webp,image/avif" required /></label>
        <label>Descripción<input id="alt" maxlength="160" placeholder="Ej. Comedor interior" required /></label>
        <label>Orden<input id="orden" type="number" min="0" value="0" required /></label>
        <button type="submit">Subir fotografía</button>
      </form>

      <p id="message" class="message" aria-live="polite"></p>
      <div id="photoList" class="photo-list"></div>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
