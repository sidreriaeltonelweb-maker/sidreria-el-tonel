<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sidrería El Tonel</title><link rel="stylesheet" href="estilos.css"></head><body><header><h1>Sidrería El Tonel</h1><p>Soto de Cangas · Cocina asturiana</p><a href="#reservas" class="btn">Reservar mesa</a></header><section><h2>Horario</h2><p>Abierto de 11:30 a 23:00. Cerrado los miércoles.</p></section><section id="reservas"><h2>Reserva tu mesa</h2><form id="formReservaPublica"><input id="nombre" placeholder="Nombre" required><input id="telefono" placeholder="Teléfono" required><input id="personas" type="number" placeholder="Personas" required><input id="fecha" type="date" required><input id="hora" type="time" required><textarea id="observaciones" placeholder="Observaciones"></textarea><button type="submit">Enviar reserva</button></form><p id="mensajeReserva"></p></section><footer>📍 Soto de Cangas · 📞 684 569 175</footer><script>const API_URL='https://sidreria-el-tonel.onrender.com';document.querySelector('#formReservaPublica').addEventListener('submit',async(e)=>{e.preventDefault();const fecha=document.querySelector('#fecha').value;const hora=document.querySelector('#hora').value;const dia=new Date(fecha+'T12:00:00').getDay();const msg=document.querySelector('#mensajeReserva');if(dia===3){msg.textContent='Los miércoles estamos cerrados.';return;}if(hora<'11:30'||hora>'23:00'){msg.textContent='El horario de reservas es de 11:30 a 23:00.';return;}const reserva={cliente_nombre:document.querySelector('#nombre').value,cliente_telefono:document.querySelector('#telefono').value,personas:Number(document.querySelector('#personas').value),fecha,hora,observaciones:document.querySelector('#observaciones').value};const response=await fetch(`${API_URL}/reservas/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reserva)});if(!response.ok){msg.textContent='No se pudo enviar la reserva.';return;}e.target.reset();msg.textContent='Reserva enviada. El restaurante la confirmará desde la app.';});</script></body></html>
