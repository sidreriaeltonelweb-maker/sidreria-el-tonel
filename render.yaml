services:
  - type: web
    name: sidreria-el-tonel-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.db.seed && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://sidreriaeltonelweb-maker.github.io
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@sidreriaeltonel.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACE_ID
        sync: false
