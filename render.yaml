services:
  - type: web
    name: sidreria-el-tonel-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.db.seed && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://sidreriaeltonelweb-maker.github.io
      - key: SECRET_KEY
        generateValue: true
